server:
  port: ${SERVER_PORT:8080}

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/daily_question?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:always}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  invite:
    token: ${APP_INVITE_TOKEN:team-2026}
    passcode: ${APP_INVITE_PASSCODE:daily-question}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.dailyquestion.mapper: debug
